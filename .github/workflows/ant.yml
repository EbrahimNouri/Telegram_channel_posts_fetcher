name: Telegram Channel Posts Logger

on:
  schedule:
    - cron: '0 */1 * * *'
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel username (without @)'
        required: false
        type: string
        default: 'mitivpn'
      count:
        description: 'Number of posts to fetch'
        required: false
        type: string
        default: '10'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build with Ant
      run: ant -noinput -buildfile build.xml
    
    - name: Run Logger
      env:
        CHANNEL_USERNAME: ${{ github.event.inputs.channel || 'mitivpn' }}
        POST_COUNT: ${{ github.event.inputs.count || '10' }}
      run: java -cp build Main
    
    - name: Update README with latest posts
      run: |
        # Read the last 50 lines of log file
        LAST_POSTS=$(tail -50 posts_log.txt)
        
        # Create a formatted section for README
        cat > readme_posts_section.md << EOF
        
        ## Latest Channel Posts
        
        \`\`\`
        $(echo "$LAST_POSTS")
        \`\`\`
        
        *Last updated: $(date +'%Y-%m-%d %H:%M:%S') UTC*
        EOF
        
        # Check if README already has the posts section
        if grep -q "## Latest Channel Posts" README.md; then
          # Replace existing section
          sed -i '/## Latest Channel Posts/,$d' README.md
        fi
        
        # Append the new posts section
        cat readme_posts_section.md >> README.md
    
    - name: Commit and Push if Changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        git add posts_log.txt README.md
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update posts log and README - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
          echo "Changes committed and pushed!"
        fi
    
    - name: Upload Log as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: posts-log
        path: posts_log.txt
        retention-days: 90
