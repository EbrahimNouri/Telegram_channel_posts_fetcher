name: Telegram Posts HTML Logger + GitHub Pages

on:
  schedule:
    - cron: '0 */1 * * *'
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel username (without @)'
        required: false
        type: string
        default: 'proxymtproto'
      count:
        description: 'Number of posts to fetch'
        required: false
        type: string
        default: '100'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build with Ant
      run: ant -noinput -buildfile build.xml
    
    - name: Run Logger
      env:
        CHANNEL_USERNAME: ${{ github.event.inputs.channel || 'proxymtproto' }}
        POST_COUNT: ${{ github.event.inputs.count || '100' }}
      run: java -cp build Main
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  commit:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build with Ant
      run: ant -noinput -buildfile build.xml
    
    - name: Run Logger
      env:
        CHANNEL_USERNAME: ${{ github.event.inputs.channel || 'proxymtproto' }}
        POST_COUNT: ${{ github.event.inputs.count || '100' }}
      run: java -cp build Main
    
    - name: Commit and Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add posts.html posts_log.txt media/ README.md
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "Update $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
