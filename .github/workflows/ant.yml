name: Telegram Posts HTML Logger

on:
  schedule:
    - cron: '0 */1 * * *'
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel username (without @)'
        required: false
        type: string
        default: 'proxymtproto'
      count:
        description: 'Number of posts to fetch'
        required: false
        type: string
        default: '100'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Build with Ant
      run: ant -noinput -buildfile build.xml
    
    - name: Run Logger
      env:
        CHANNEL_USERNAME: ${{ github.event.inputs.channel || 'proxymtproto' }}
        POST_COUNT: ${{ github.event.inputs.count || '100' }}
      run: java -cp build Main
    
    - name: Update README
      run: |
        echo "🌐 [View Posts Page](posts.html)" > readme_section.md
        echo "" >> readme_section.md
        echo "*Last updated: $(date +'%Y-%m-%d %H:%M:%S') UTC*" >> readme_section.md
        
        if grep -q "🌐" README.md; then
          sed -i '/🌐/,$d' README.md
        fi
        cat readme_section.md >> README.md
    
    - name: Commit and Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add posts.html README.md media/
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "Update posts HTML - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: posts-html
        path: posts.html
        retention-days: 7
