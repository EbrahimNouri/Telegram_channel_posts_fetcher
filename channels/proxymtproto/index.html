.file-badge { display: inline-block; background: #e8f5e9; color: #2a9d8f; padding: 3px 9px; border-radius: 10px; font-size: 10px; text-decoration: none; border: 1px solid #c8e6c9; }

.folder-link { display: inline-block; color: #2a9d8f; font-size: 10px; margin-top: 4px; text-decoration: none; }
